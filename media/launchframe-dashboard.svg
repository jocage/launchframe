  <text x="1120" y="146" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="13">DB, billing, deploy resolved intentionally.</text>
  <text x="1120" y="176" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="14" font-weight="700">AI-first repo shape</text>
  <text x="1120" y="196" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="13">Thin routes, clear boundaries, agent-ready.</text>

