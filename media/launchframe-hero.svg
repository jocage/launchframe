<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1600" height="920" fill="#09090B"/>
  <!-- Gradient orbs -->
  <circle cx="1300" cy="120" r="320" fill="url(#orb1)" opacity="0.35"/>
  <circle cx="200" cy="800" r="280" fill="url(#orb2)" opacity="0.25"/>
  <!-- Noise overlay hint -->
  <rect width="1600" height="920" fill="#09090B" opacity="0.02"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="1600" height="64" fill="#09090B" opacity="0.6"/>
  <rect x="0" y="63" width="1600" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="68" y="40" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="17" font-weight="900" letter-spacing="-0.5">launch</text>
  <text x="138" y="40" fill="#00D4AA" font-family="system-ui, sans-serif" font-size="17" font-weight="900" letter-spacing="-0.5">frame</text>
  <rect x="1356" y="18" width="110" height="32" rx="16" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="1381" y="39" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Sign in</text>
  <rect x="1478" y="18" width="96" height="32" rx="16" fill="#00D4AA"/>
  <text x="1493" y="39" fill="#09090B" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Get started</text>

  <!-- Badge pill -->
  <rect x="600" y="128" width="186" height="32" rx="16" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.12)"/>
  <text x="624" y="149" fill="#00D4AA" font-family="ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="1.5">SHIP FASTER IN 2026</text>

  <!-- Hero heading -->
  <text x="800" y="236" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="64" font-weight="900" letter-spacing="-2.5" text-anchor="middle">Build your SaaS</text>
  <text x="800" y="312" font-family="system-ui, sans-serif" font-size="64" font-weight="900" letter-spacing="-2.5" text-anchor="middle" fill="url(#grad1)">without the boilerplate.</text>

  <!-- Subheading -->
  <text x="800" y="376" fill="#9490A5" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">Auth, billing, email, database — all wired up and ready.</text>
  <text x="800" y="406" fill="#9490A5" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">Stop rebuilding infrastructure and start shipping your product.</text>

  <!-- CTA buttons -->
  <rect x="546" y="444" width="220" height="48" rx="24" fill="#00D4AA"/>
  <text x="592" y="474" fill="#09090B" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Explore the live demo</text>
  <rect x="782" y="444" width="240" height="48" rx="24" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="830" y="474" fill="#9490A5" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Start from this baseline</text>

  <!-- Bento section label -->
  <text x="800" y="556" fill="#00D4AA" font-family="ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="1.5" text-anchor="middle">EVERYTHING INCLUDED</text>
  <text x="800" y="592" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="-1.5" text-anchor="middle">Production-ready from day one</text>

  <!-- Bento grid row 1 -->
  <!-- Card 1: Auth (wide) -->
  <rect x="68" y="628" width="500" height="128" rx="18" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="100" y="664" fill="#F0EEF5" font-size="24">🔐</text>
  <text x="100" y="696" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Authentication</text>
  <text x="100" y="718" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13">Better Auth with sessions, middleware, and protected routes.</text>
  <rect x="100" y="732" width="80" height="20" rx="10" fill="#1E1E22" stroke="rgba(255,255,255,0.06)"/>
  <text x="112" y="746" fill="#9490A5" font-family="ui-monospace, monospace" font-size="10">Better Auth</text>
  <rect x="188" y="732" width="68" height="20" rx="10" fill="#1E1E22" stroke="rgba(255,255,255,0.06)"/>
  <text x="200" y="746" fill="#9490A5" font-family="ui-monospace, monospace" font-size="10">Sessions</text>

  <!-- Card 2: Billing -->
  <rect x="584" y="628" width="242" height="128" rx="18" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="616" y="664" fill="#F0EEF5" font-size="24">💳</text>
  <text x="616" y="696" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Billing</text>
  <text x="616" y="718" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13">Stripe + Polar abstraction.</text>
  <rect x="616" y="732" width="52" height="20" rx="10" fill="#1E1E22" stroke="rgba(255,255,255,0.06)"/>
  <text x="626" y="746" fill="#9490A5" font-family="ui-monospace, monospace" font-size="10">Stripe</text>
  <rect x="676" y="732" width="48" height="20" rx="10" fill="#1E1E22" stroke="rgba(255,255,255,0.06)"/>
  <text x="687" y="746" fill="#9490A5" font-family="ui-monospace, monospace" font-size="10">Polar</text>

  <!-- Card 3: Database -->
  <rect x="842" y="628" width="242" height="128" rx="18" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="874" y="664" fill="#F0EEF5" font-size="24">🗄️</text>
  <text x="874" y="696" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Database</text>
  <text x="874" y="718" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13">Drizzle ORM + PostgreSQL.</text>
  <rect x="874" y="732" width="56" height="20" rx="10" fill="#1E1E22" stroke="rgba(255,255,255,0.06)"/>
  <text x="885" y="746" fill="#9490A5" font-family="ui-monospace, monospace" font-size="10">Drizzle</text>
  <rect x="938" y="732" width="78" height="20" rx="10" fill="#1E1E22" stroke="rgba(255,255,255,0.06)"/>
  <text x="950" y="746" fill="#9490A5" font-family="ui-monospace, monospace" font-size="10">PostgreSQL</text>

  <!-- Card 4: Email (wide) -->
  <rect x="1100" y="628" width="432" height="128" rx="18" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="1132" y="664" fill="#F0EEF5" font-size="24">📧</text>
  <text x="1132" y="696" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Transactional email</text>
  <text x="1132" y="718" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13">Resend with HTML templates for auth and billing.</text>
  <rect x="1132" y="732" width="56" height="20" rx="10" fill="#1E1E22" stroke="rgba(255,255,255,0.06)"/>
  <text x="1144" y="746" fill="#9490A5" font-family="ui-monospace, monospace" font-size="10">Resend</text>

  <!-- Bento grid row 2 -->
  <!-- Card 5: Testing -->
  <rect x="68" y="772" width="370" height="112" rx="18" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="100" y="808" fill="#F0EEF5" font-size="24">🧪</text>
  <text x="100" y="836" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Testing</text>
  <text x="100" y="858" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13">Vitest + Playwright with pre-commit hooks.</text>

  <!-- Card 6: Next.js -->
  <rect x="454" y="772" width="370" height="112" rx="18" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="486" y="808" fill="#F0EEF5" font-size="24">⚡</text>
  <text x="486" y="836" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Next.js 16</text>
  <text x="486" y="858" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13">App Router, React 19, server components.</text>

  <!-- Card 7: Agent-friendly -->
  <rect x="840" y="772" width="370" height="112" rx="18" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="872" y="808" fill="#F0EEF5" font-size="24">🤖</text>
  <text x="872" y="836" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Agent-friendly</text>
  <text x="872" y="858" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13">AGENTS.md, flat file tree, explicit placeholders.</text>

  <!-- Card 8: Deploy -->
  <rect x="1226" y="772" width="306" height="112" rx="18" fill="#111113" stroke="rgba(255,255,255,0.06)"/>
  <text x="1258" y="808" fill="#F0EEF5" font-size="24">🚀</text>
  <text x="1258" y="836" fill="#F0EEF5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Deploy</text>
  <text x="1258" y="858" fill="#9490A5" font-family="system-ui, sans-serif" font-size="13">Vercel or Docker — your choice.</text>

  <!-- Gradients -->
  <defs>
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5B8DEF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#5B8DEF"/>
    </linearGradient>
  </defs>
</svg>
