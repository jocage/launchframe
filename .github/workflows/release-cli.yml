name: Release CLI

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      changelog:
        description: "Changelog entry (markdown list items, e.g. '- feat: new thing')"
        required: true
        type: string
      publish:
        description: "Publish to npm"
        required: true
        default: true
        type: boolean

jobs:
  release-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        id: bump
        working-directory: apps/cli
        run: |
          OLD=$(node -p "require('./package.json').version")
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "old_version=$OLD" >> "$GITHUB_OUTPUT"
          echo "Bumped $OLD → $NEW"

      - name: Update docs changelog
        run: node scripts/update-changelog.mjs "${{ steps.bump.outputs.version }}" "${{ inputs.changelog }}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/cli/package.json apps/docs/content/docs/changelog.mdx
          git commit -m "chore: release create-launchframe@${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push && git push --tags

      - name: Verify starter matrix
        run: |
          pnpm smoke:verify:blank
          pnpm smoke:verify:dashboard
          pnpm smoke:verify:postgresjs

      - name: Pack CLI
        run: pnpm cli:pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: create-launchframe-tarball
          path: create-launchframe-*.tgz

      - name: Dry-run publish
        run: pnpm cli:publish:dry-run

      - name: Publish to npm
        if: ${{ inputs.publish }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter create-launchframe publish --access public --no-git-checks --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes "$(cat <<'EOF'
          ## create-launchframe@${{ steps.bump.outputs.version }}

          ${{ inputs.changelog }}

          **npm**: \`npx create-launchframe@${{ steps.bump.outputs.version }}\`
          EOF
          )" \
            create-launchframe-*.tgz
