name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: __CI_CACHE__

      - name: Install
        run: __CI_INSTALL_COMMAND__

      - name: Lint
        run: __CI_RUN_LINT__

      - name: Typecheck
        run: __CI_RUN_TYPECHECK__

      - name: Unit tests
        run: __CI_RUN_TEST__

      - name: Build
        run: __CI_RUN_BUILD__
